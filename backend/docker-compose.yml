version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gym_progress_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym_progress_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: gym_progress_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gym_progress_db
      SECRET_KEY: your-super-secret-key-change-this-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: